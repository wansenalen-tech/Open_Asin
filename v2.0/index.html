<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Asin Opener</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; }
        
        #app {
            display: none; 
            padding: 20px;
            background-color: #f5f5f5; 
            height: 100vh;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
            user-select: none;
        }

        h3 { color: #333; margin-bottom: 15px; text-align: center; }
        
        /* --- 内部通知样式 --- */
        #message-box {
            margin: 15px auto 10px auto; 
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            max-width: 600px;
            text-align: center;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .browser-container { 
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; 
            max-width: 600px; margin: 0 auto;
            min-height: 100px;
        }
        
        /* 默认隐藏所有浏览器卡片，让 JS 决定是否显示 */
        .browser-card {
            display: none; 
            background: white; border: 2px solid transparent; border-radius: 8px;
            width: 90px; height: 90px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .browser-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .browser-card.active { border-color: #3b82f6; background-color: #eff6ff; }
        
        .icon { font-size: 30px; margin-bottom: 5px; }
        .name { font-size: 13px; color: #666; font-weight: 500; }
        
    </style>
</head>
<body>

    <div id="app">
        <h3>默认浏览器设置</h3>
        
        <div class="browser-container">
            <div class="browser-card" data-browser-code="chrome" onclick="selectBrowser('chrome', 'Google Chrome')">
                <div class="icon">🔵</div>
                <div class="name">Chrome</div>
            </div>
            <div class="browser-card" data-browser-code="msedge" onclick="selectBrowser('msedge', 'Microsoft Edge')">
                <div class="icon">🌊</div>
                <div class="name">Edge</div>
            </div>
            <div class="browser-card" data-browser-code="firefox" onclick="selectBrowser('firefox', 'Mozilla Firefox')">
                <div class="icon">🦊</div>
                <div class="name">Firefox</div>
            </div>
            <div class="browser-card" data-browser-code="safari" onclick="selectBrowser('safari', 'Safari')">
                <div class="icon">🧭</div>
                <div class="name">Safari</div>
            </div>
            <div class="browser-card" data-browser-code="default" onclick="selectBrowser('default', '系统默认')">
                <div class="icon">💻</div>
                <div class="name">默认</div>
            </div>
            </div>
        
        <div id="message-box"></div> 
        
    </div>

<script>
    let configDoc = { 
        _id: "cfg_browser", 
        data: { code: 'default', name: '系统默认' } 
    };
    
    let _installedCodes = []; 

    function loadSettings() {
        const saved = utools.db.get(configDoc._id);
        if (saved && saved.data) {
            configDoc = saved; 
        }
    }
    
    function showInternalNotification(type, message) {
        const box = document.getElementById('message-box');
        box.className = ''; 
        box.classList.add(type);
        box.innerHTML = message;
        box.style.display = 'block';

        setTimeout(() => {
            box.style.display = 'none';
        }, 4000);
    }

    function selectBrowser(code, name) {
        // 直接使用传入的 code 和 name，不再需要特殊处理 'custom'
        configDoc.data = { code, name }; 
        
        const result = utools.db.put(configDoc);

        if (result && !result.error) {
            configDoc._rev = result.rev;
            showInternalNotification('success', `✅ 已成功保存默认浏览器为: ${name}`); 
        } else {
            const errorMsg = result ? result.message : "未知错误";
            showInternalNotification('error', `❌ 错误：配置写入数据库失败！(${errorMsg})`); 
        }
        
        renderUI(_installedCodes); 
    }

    function renderUI(installedCodes) {
        const cards = document.querySelectorAll('.browser-card');
        
        if (installedCodes && installedCodes.length > 0) {
            cards.forEach(card => {
                const code = card.getAttribute('data-browser-code');
                
                // 只有在 installedCodes 中 (即被检测到) 时才显示。
                if (installedCodes.includes(code)) {
                    card.style.display = 'flex'; 
                } else {
                    card.style.display = 'none'; 
                }
            });
        }
        
        // 确保当前选中的卡片是激活状态，且是可见的
        cards.forEach(card => {
            const code = card.getAttribute('data-browser-code');
            if (code === configDoc.data.code) {
                card.classList.add('active');
                // 确保选中的卡片显示 (如果它是未被检测到的旧配置，它也会显示)
                card.style.display = 'flex'; 
            } else {
                card.classList.remove('active');
            }
        });
    }

    // --- 插件入口 (使用 try/catch 确保启动) ---
    utools.onPluginEnter(({ code, type, payload }) => {
        try {
            loadSettings();

            if (code === 'settings') {
                if (!window.preload || typeof window.preload.detectInstalledBrowsers !== 'function') {
                     throw new Error('核心脚本(preload.js)未加载或已损坏。');
                }
                
                _installedCodes = window.preload.detectInstalledBrowsers(); 
                
                renderUI(_installedCodes); 
                
                document.getElementById('app').style.display = 'block'; 
                // 调整高度以适应 5 个卡片
                utools.setExpendHeight(280); 

            } else if (code === 'auto_open') {
                utools.hideMainWindow(true); 
                
                if (!window.preload || typeof window.preload.openBrowser !== 'function') {
                    throw new Error('核心脚本(preload.js)未加载，无法打开浏览器。');
                }

                handleAutoOpen(payload);
            }
        } catch (e) {
            utools.showNotification(`插件核心启动失败！请检查文件。错误信息: ${e.message}`);
            console.error("Fatal Plugin Error:", e);
        }
    });

    function handleAutoOpen(input) {
        let cleanInput = input.trim();
        let finalUrl = "";

        if (/^https?:\/\//i.test(cleanInput)) {
            finalUrl = cleanInput;
        } else {
            let fixedAsin = cleanInput.replace(/^BO/i, 'B0');
            finalUrl = `https://www.amazon.com/dp/${fixedAsin}`;
        }

        window.preload.openBrowser(finalUrl, configDoc.data.code, configDoc.data.name);
    }
</script>
</body>
</html>
